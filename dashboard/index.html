<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>aiNOC Dashboard</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --blue: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #e3b341;
    --purple: #bc8cff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
    font-size: 15px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  #header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  #header .logo {
    font-size: 17px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.5px;
  }

  .meta-group {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--muted);
    font-size: 14px;
  }

  .meta-group .label { color: var(--muted); }
  .meta-group .value { color: var(--text); font-weight: 600; }
  .meta-group .value.highlight { color: var(--blue); }
  .meta-group .value.cost { color: var(--green); }

  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    display: inline-block;
    margin-right: 4px;
  }
  #status-dot.active {
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  #status-dot.idle { background: var(--muted); }
  #status-dot.disconnected { background: var(--red); }

  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(63,185,80,0.5); }
    70%  { box-shadow: 0 0 0 6px rgba(63,185,80,0); }
    100% { box-shadow: 0 0 0 0 rgba(63,185,80,0); }
  }

  #ws-status {
    font-size: 13px;
    color: var(--muted);
  }
  #ws-status.error { color: var(--red); }

  #stop-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    display: none;
  }
  #stop-btn:hover { background: rgba(248,81,73,0.15); }
  #stop-btn:active { background: rgba(248,81,73,0.3); }

  /* ── Main panels ── */
  #main {
    display: grid;
    grid-template-columns: 1fr 1fr;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  .panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .panel:last-child { border-right: none; }

  .panel-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .panel-header .scroll-toggle {
    margin-left: auto;
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    user-select: none;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
  }
  .panel-header .scroll-toggle:hover { color: var(--text); }
  .panel-header .scroll-toggle.locked { color: var(--yellow); border-color: var(--yellow); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    scroll-behavior: smooth;
  }

  /* ── Idle overlay ── */
  #idle-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--bg);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
  }
  #idle-overlay.visible { display: flex; }
  #idle-overlay .idle-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2.5s infinite;
  }
  #idle-overlay .idle-text { color: var(--muted); font-size: 17px; }
  #idle-overlay .idle-sub { color: var(--border); font-size: 13px; margin-top: -8px; }

  /* ── Reasoning panel ── */
  #reasoning-body {
    line-height: 1.6;
  }

  #reasoning-body p { margin-bottom: 8px; }
  #reasoning-body code {
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 14px;
    color: var(--purple);
  }
  #reasoning-body pre {
    background: #1c2128;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    overflow-x: auto;
    margin-bottom: 10px;
    font-size: 14px;
  }
  #reasoning-body strong { color: var(--orange); }
  #reasoning-body h1,h2,h3 { color: var(--blue); margin-bottom: 6px; margin-top: 10px; }
  #reasoning-body table {
    border-collapse: collapse;
    margin-bottom: 10px;
    font-size: 14px;
  }
  #reasoning-body th, #reasoning-body td {
    border: 1px solid var(--border);
    padding: 4px 8px;
  }
  #reasoning-body th { background: var(--surface); color: var(--blue); }

  /* Cursor blink when streaming */
  #cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--text);
    animation: blink 1s step-end infinite;
    vertical-align: text-bottom;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Tool calls panel ── */
  .tool-entry {
    margin-bottom: 8px;
    border: 1px solid var(--border);
    border-radius: 5px;
    overflow: hidden;
  }

  .tool-header {
    padding: 7px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
    background: var(--surface);
  }
  .tool-header:hover { background: #1c2128; }

  .tool-icon {
    font-size: 14px;
    width: 16px;
    text-align: center;
    flex-shrink: 0;
  }

  .tool-name {
    font-weight: 700;
    color: var(--blue);
    font-size: 14px;
  }

  .tool-name.mcp {
    background: rgba(63,185,80,0.15);
    color: var(--green);
    border: 1px solid rgba(63,185,80,0.4);
    border-radius: 3px;
    padding: 1px 6px;
  }

  .tool-device {
    color: var(--orange);
    font-size: 13px;
    font-weight: 600;
  }

  .tool-args {
    color: var(--muted);
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .tool-status {
    margin-left: auto;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .tool-status.pending { color: var(--yellow); }
  .tool-status.done { color: var(--green); }
  .tool-status.error { color: var(--red); }

  .tool-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .tool-body.open { display: block; }

  .tool-section {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
  }
  .tool-section:last-child { border-bottom: none; }

  .tool-section-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.8px;
    margin-bottom: 5px;
  }

  .tool-section pre {
    background: #1c2128;
    border-radius: 3px;
    padding: 8px 10px;
    overflow-x: auto;
    font-size: 13px;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
  }

  .tool-result-text {
    font-size: 14px;
    color: var(--green);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 400px;
    overflow-y: auto;
  }

  .tool-result-truncated {
    color: var(--muted);
    font-size: 13px;
    font-style: italic;
    margin-top: 6px;
  }

  .show-more-btn {
    cursor: pointer;
    color: var(--blue);
    font-size: 13px;
    margin-top: 4px;
    display: inline-block;
  }
  .show-more-btn:hover { text-decoration: underline; }

  .copy-btn {
    cursor: pointer;
    color: var(--muted);
    font-size: 12px;
    padding: 2px 6px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    font-family: inherit;
    letter-spacing: 0.5px;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--muted); }

  #dismiss-btn {
    margin-left: 0;
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    border-radius: 3px;
    cursor: pointer;
    display: none;
  }
  #dismiss-btn:hover { background: rgba(139,148,158,0.15); color: var(--text); }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <span class="logo">aiNOC</span>

  <div class="meta-group">
    <span id="status-dot" class="idle"></span>
    <span class="label">STATUS</span>
    <span class="value" id="hdr-status">Monitoring</span>
  </div>

  <div class="meta-group" id="hdr-device-group" style="display:none">
    <span class="label">DEVICE</span>
    <span class="value highlight" id="hdr-device">—</span>
  </div>

  <div class="meta-group" id="hdr-session-group" style="display:none">
    <span class="label">SESSION</span>
    <span class="value" id="hdr-session">—</span>
  </div>

  <div class="meta-group" id="hdr-jira-group" style="display:none">
    <span class="label">JIRA</span>
    <span class="value highlight" id="hdr-jira">—</span>
  </div>

  <div class="meta-group" id="hdr-elapsed-group" style="display:none">
    <span class="label">ELAPSED</span>
    <span class="value" id="hdr-elapsed">0s</span>
  </div>

  <div class="meta-group" id="hdr-cost-group" style="display:none">
    <span class="label">COST</span>
    <span class="value cost" id="hdr-cost">—</span>
  </div>

  <button id="stop-btn" onclick="stopSession()">■ STOP</button>
  <button id="dismiss-btn" onclick="dismissSession()">✕ DISMISS</button>
  <div id="ws-status">Connecting…</div>
</div>

<!-- Idle overlay -->
<div id="idle-overlay" class="visible">
  <div class="idle-dot"></div>
  <div class="idle-text">Monitoring — No Active Session</div>
  <div class="idle-sub">Waiting for SLA path failure events</div>
</div>

<!-- Main panels -->
<div id="main" style="position:relative">
  <div class="panel">
    <div class="panel-header">
      AGENT REASONING
      <button class="copy-btn" onclick="copyPanel('reasoning-body', this)" title="Copy to clipboard">COPY</button>
      <span class="scroll-toggle" id="reasoning-lock-btn" onclick="toggleReasoningLock()">AUTO-SCROLL ON</span>
    </div>
    <div class="panel-body" id="reasoning-body"></div>
  </div>

  <div class="panel">
    <div class="panel-header">
      TOOL CALLS
      <button class="copy-btn" onclick="copyPanel('tools-body', this)" title="Copy to clipboard">COPY</button>
      <span class="scroll-toggle" id="tools-lock-btn" onclick="toggleToolsLock()">AUTO-SCROLL ON</span>
    </div>
    <div class="panel-body" id="tools-body"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Config
// ─────────────────────────────────────────────────────────────────────────────
const MAX_RESULT_LINES = 500;
const RECONNECT_BASE_MS = 3000;
const RECONNECT_MAX_MS = 30000;

// ─────────────────────────────────────────────────────────────────────────────
// State
// ─────────────────────────────────────────────────────────────────────────────
let ws = null;
let reconnectDelay = RECONNECT_BASE_MS;
let sessionStartTime = null;
let elapsedTimer = null;
let reasoningLocked = false;
let toolsLocked = false;
let reasoningBuffer = "";       // accumulate markdown text before rendering
let renderPending = false;
let sessionHeld = false;        // keep content visible after session completes

// Tool call tracking: id → { el, hasResult }
const toolEntries = {};

// ─────────────────────────────────────────────────────────────────────────────
// WebSocket
// ─────────────────────────────────────────────────────────────────────────────
function connect() {
  // Connect to the same port the page was served from (single-port server)
  const wsUrl = `ws://${location.hostname}:${location.port}`;
  setWsStatus("Connecting…", false);
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    setWsStatus("Connected", false);
    reconnectDelay = RECONNECT_BASE_MS;
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      handleMessage(msg);
    } catch {}
  };

  ws.onclose = () => {
    setWsStatus(`Reconnecting in ${Math.round(reconnectDelay/1000)}s…`, true);
    setTimeout(connect, reconnectDelay);
    reconnectDelay = Math.min(reconnectDelay * 1.5, RECONNECT_MAX_MS);
  };

  ws.onerror = () => {};
}

// ─────────────────────────────────────────────────────────────────────────────
// Message dispatcher
// ─────────────────────────────────────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.ui_type) {
    case "init":
      applyState(msg.state);
      msg.buffer.forEach(ev => handleMessage(ev));
      break;
    case "session_start":
      onSessionStart(msg);
      break;
    case "session_idle":
      onSessionIdle();
      break;
    case "session_end":
      onSessionEnd(msg);
      break;
    case "reasoning":
      appendReasoning(msg.text);
      break;
    case "tool_start":
      addToolEntry(msg.id, msg.tool, msg.is_mcp);
      break;
    case "tool_input_complete":
      updateToolInput(msg.id, msg.tool, msg.input);
      break;
    case "tool_result":
      setToolResult(msg.id, msg.output);
      break;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Session lifecycle
// ─────────────────────────────────────────────────────────────────────────────
function applyState(state) {
  if (state && state.state === "active") {
    onSessionStart(state);
  } else {
    onSessionIdle();
  }
}

function onSessionStart(msg) {
  // Auto-dismiss any held completed session when a new one begins
  sessionHeld = false;
  document.getElementById("dismiss-btn").style.display = "none";
  clearPanels();

  document.getElementById("idle-overlay").classList.remove("visible");
  const stopBtn = document.getElementById("stop-btn");
  stopBtn.style.display = "block";
  stopBtn.textContent = "■ STOP";
  stopBtn.style.opacity = "1";
  stopBtn.disabled = false;

  const dot = document.getElementById("status-dot");
  dot.className = "active";

  document.getElementById("hdr-status").textContent = "Active";
  showMeta("hdr-device-group", "hdr-device", msg.device_name || msg.device_ip || "—");
  showMeta("hdr-session-group", "hdr-session", (msg.session_name || "").replace("oncall-", ""));
  showMeta("hdr-jira-group", "hdr-jira", msg.issue_key || "—");
  showMeta("hdr-elapsed-group", "hdr-elapsed", "0s");
  showMeta("hdr-cost-group", "hdr-cost", "—");

  sessionStartTime = msg.started_at ? new Date(msg.started_at) : new Date();
  startElapsedTimer();
}

function onSessionIdle() {
  if (sessionHeld) {
    // Keep panels visible — watcher has resumed monitoring, update status to reflect this
    document.getElementById("hdr-status").textContent = "Completed — Monitoring";
    document.getElementById("status-dot").className = "active";
    return;
  }
  document.getElementById("idle-overlay").classList.add("visible");
  document.getElementById("stop-btn").style.display = "none";
  document.getElementById("status-dot").className = "idle";
  document.getElementById("hdr-status").textContent = "Monitoring";
  hideMeta("hdr-device-group");
  hideMeta("hdr-session-group");
  hideMeta("hdr-jira-group");
  hideMeta("hdr-elapsed-group");
  hideMeta("hdr-cost-group");

  stopElapsedTimer();
  sessionStartTime = null;
  clearPanels();
}

function onSessionEnd(msg) {
  sessionHeld = true;
  document.getElementById("status-dot").className = "idle";
  document.getElementById("stop-btn").style.display = "none";
  document.getElementById("dismiss-btn").style.display = "block";
  document.getElementById("hdr-status").textContent = "Completed";
  stopElapsedTimer();

  if (msg.cost != null) {
    document.getElementById("hdr-cost").textContent = `$${msg.cost.toFixed(4)}`;
  }

  // Remove cursor
  const cursor = document.getElementById("cursor");
  if (cursor) cursor.remove();
  flushReasoning();
}

// ─────────────────────────────────────────────────────────────────────────────
// Reasoning panel
// ─────────────────────────────────────────────────────────────────────────────
function appendReasoning(text) {
  reasoningBuffer += text;
  if (!renderPending) {
    renderPending = true;
    requestAnimationFrame(flushReasoning);
  }
}

function flushReasoning() {
  renderPending = false;
  if (!reasoningBuffer) return;

  const body = document.getElementById("reasoning-body");

  // Remove cursor before re-render
  const cursor = document.getElementById("cursor");
  if (cursor) cursor.remove();

  // Re-render the full accumulated markdown
  body.innerHTML = marked.parse(reasoningBuffer);

  // Apply syntax highlighting to code blocks
  body.querySelectorAll("pre code").forEach(el => hljs.highlightElement(el));

  // Re-add cursor
  const cur = document.createElement("span");
  cur.id = "cursor";
  body.appendChild(cur);

  if (!reasoningLocked) {
    body.scrollTop = body.scrollHeight;
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// Tool calls panel
// ─────────────────────────────────────────────────────────────────────────────
function addToolEntry(id, toolName, isMcp) {
  if (!id) return;
  const body = document.getElementById("tools-body");

  const nameClass = isMcp ? "tool-name mcp" : "tool-name";
  const entry = document.createElement("div");
  entry.className = "tool-entry";
  entry.id = `tool-${id}`;
  entry.innerHTML = `
    <div class="tool-header" onclick="toggleTool('${id}')">
      <span class="tool-icon">⚙</span>
      <span class="${nameClass}">${escHtml(toolName)}</span>
      <span class="tool-device" id="tool-device-${id}"></span>
      <span class="tool-args" id="tool-args-${id}">…</span>
      <span class="tool-status pending" id="tool-status-${id}">RUNNING</span>
    </div>
    <div class="tool-body" id="tool-body-${id}"></div>
  `;
  body.appendChild(entry);
  toolEntries[id] = { el: entry, hasResult: false, isMcp };

  if (!toolsLocked) body.scrollTop = body.scrollHeight;
}

function updateToolInput(id, toolName, input) {
  if (!id) return;
  const argsEl = document.getElementById(`tool-args-${id}`);
  const deviceEl = document.getElementById(`tool-device-${id}`);
  const bodyEl = document.getElementById(`tool-body-${id}`);
  if (!bodyEl) return;

  // MCP wraps tool input in {"params": {...}} — unwrap for display
  const params = (input && input.params) ? input.params : input;

  // Extract device for prominent display
  if (params && params.device) {
    if (deviceEl) deviceEl.textContent = `(${params.device})`;
  }

  // Build compact args summary from unwrapped params (exclude device)
  const argParts = Object.entries(params || {})
    .filter(([k]) => k !== "device")
    .map(([k, v]) => `${k}: ${JSON.stringify(v)}`);
  if (argsEl) argsEl.textContent = argParts.join(" | ") || "";

  // Build input section in body — show unwrapped params for readability
  const section = document.createElement("div");
  section.className = "tool-section";
  section.innerHTML = `
    <div class="tool-section-label">INPUT</div>
    <pre>${escHtml(JSON.stringify(params, null, 2))}</pre>
  `;
  bodyEl.appendChild(section);
}

function setToolResult(id, output) {
  if (!id) return;

  // Try to find by id — may not exist if tool_start was missed (e.g. late connect)
  const statusEl = document.getElementById(`tool-status-${id}`);
  const bodyEl = document.getElementById(`tool-body-${id}`);



  const lines = String(output).split("\n");
  const truncated = lines.length > MAX_RESULT_LINES;
  const displayText = truncated
    ? lines.slice(0, MAX_RESULT_LINES).join("\n")
    : String(output);

  const isError = output.toLowerCase().includes("error") && output.length < 200;

  if (statusEl) {
    statusEl.textContent = "DONE";
    statusEl.className = isError ? "tool-status error" : "tool-status done";
  }

  if (bodyEl) {
    const section = document.createElement("div");
    section.className = "tool-section";
    let resultHtml = `<div class="tool-section-label">RESULT</div>
      <div class="tool-result-text">${escHtml(displayText)}</div>`;
    if (truncated) {
      resultHtml += `<div class="tool-result-truncated">… ${lines.length - MAX_RESULT_LINES} more lines hidden</div>
        <span class="show-more-btn" onclick="showFullResult(this, '${escHtml(String(output)).replace(/'/g, "\\'")}')">Show all ${lines.length} lines</span>`;
    }
    section.innerHTML = resultHtml;
    bodyEl.appendChild(section);

    // Auto-open the tool body on result
    bodyEl.classList.add("open");
  }

  if (toolEntries[id]) toolEntries[id].hasResult = true;

  const toolsBody = document.getElementById("tools-body");
  if (!toolsLocked) toolsBody.scrollTop = toolsBody.scrollHeight;
}

function toggleTool(id) {
  const body = document.getElementById(`tool-body-${id}`);
  if (body) body.classList.toggle("open");
}

function showFullResult(btn, fullText) {
  const container = btn.parentElement;
  container.querySelector(".tool-result-text").textContent = fullText;
  const truncNote = container.querySelector(".tool-result-truncated");
  if (truncNote) truncNote.remove();
  btn.remove();
}

// ─────────────────────────────────────────────────────────────────────────────
// Helpers
// ─────────────────────────────────────────────────────────────────────────────
function clearPanels() {
  document.getElementById("reasoning-body").innerHTML = "";
  document.getElementById("tools-body").innerHTML = "";
  reasoningBuffer = "";
  renderPending = false;
  Object.keys(toolEntries).forEach(k => delete toolEntries[k]);
}

function showMeta(groupId, valueId, text) {
  document.getElementById(groupId).style.display = "flex";
  document.getElementById(valueId).textContent = text;
}

function hideMeta(groupId) {
  document.getElementById(groupId).style.display = "none";
}

function setWsStatus(text, isError) {
  const el = document.getElementById("ws-status");
  el.textContent = text;
  el.className = isError ? "error" : "";
}

function startElapsedTimer() {
  stopElapsedTimer();
  elapsedTimer = setInterval(updateElapsed, 1000);
  updateElapsed();
}

function stopElapsedTimer() {
  if (elapsedTimer) { clearInterval(elapsedTimer); elapsedTimer = null; }
}

function updateElapsed() {
  if (!sessionStartTime) return;
  const sec = Math.floor((Date.now() - sessionStartTime.getTime()) / 1000);
  const m = Math.floor(sec / 60), s = sec % 60;
  document.getElementById("hdr-elapsed").textContent = m > 0 ? `${m}m ${s}s` : `${s}s`;
}

function stopSession() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({action: "stop"}));
    const btn = document.getElementById("stop-btn");
    btn.textContent = "■ STOPPING…";
    btn.style.opacity = "0.5";
    btn.disabled = true;
  }
}

function dismissSession() {
  sessionHeld = false;
  document.getElementById("dismiss-btn").style.display = "none";
  onSessionIdle();
}

function copyPanel(panelId, btn) {
  const el = document.getElementById(panelId);
  if (!el) return;
  const text = el.innerText || el.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = "COPIED";
    setTimeout(() => { btn.textContent = orig; }, 1500);
  });
}

function toggleReasoningLock() {
  reasoningLocked = !reasoningLocked;
  const btn = document.getElementById("reasoning-lock-btn");
  btn.textContent = reasoningLocked ? "AUTO-SCROLL OFF" : "AUTO-SCROLL ON";
  btn.className = reasoningLocked ? "scroll-toggle locked" : "scroll-toggle";
}

function toggleToolsLock() {
  toolsLocked = !toolsLocked;
  const btn = document.getElementById("tools-lock-btn");
  btn.textContent = toolsLocked ? "AUTO-SCROLL OFF" : "AUTO-SCROLL ON";
  btn.className = toolsLocked ? "scroll-toggle locked" : "scroll-toggle";
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ─────────────────────────────────────────────────────────────────────────────
// Start
// ─────────────────────────────────────────────────────────────────────────────
connect();
</script>
